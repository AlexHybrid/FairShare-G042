<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairShare — House Rental & Bill Splitter (Perfect UI)</title>
  <style>

    /* =================================
       GLOBAL VARIABLES & THEME SETTINGS
       ================================= */
        :root {
      --accent: #3b82f6;
      --bg-gradient: linear-gradient(135deg, #000428 0%, #004e92 100%);
      --navbar-bg: rgba(255, 255, 255, 0.95);
      --text-main: #ffffff;
      --text-nav: #333333;
      --max-width-content: 1000px;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    /* =========================================
       2. BODY & MAIN LAYOUT
       ========================================= */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }
