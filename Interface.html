<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairShare — House Rental & Bill Splitter (Perfect UI)</title>
  <style>

    /* =================================
       GLOBAL VARIABLES & THEME SETTINGS
       ================================= */
        :root {
      --accent: #3b82f6;
      --bg-gradient: linear-gradient(135deg, #000428 0%, #004e92 100%);
      --navbar-bg: rgba(255, 255, 255, 0.95);
      --text-main: #ffffff;
      --text-nav: #333333;
      --max-width-content: 1000px;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    /* =========================================
       2. BODY & MAIN LAYOUT
       ========================================= */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: var(--max-width-content);
      margin: 0 auto;
      padding: 0 1rem;
      width: 100%;
    }

    /* =========================================
       3. NAVIGATION BAR (HEADER)
       ========================================= */
    header {
      padding: 2rem 0;
      width: 100%;
    }

    .navbar {
      background: var(--navbar-bg);
      width: 90%; 
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      border-radius: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .navbar ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

     .navbar a {
      text-decoration: none;
      color: var(--text-nav);
      font-weight: 500;
      font-size: 1rem;
      transition: 0.3s;
      padding: 0.25rem 0.5rem;
    }

    .navbar a:hover { 
      color: var(--accent); 
    }

    .navbar a.active {
      color: #3b82f6;
      border-bottom: 2px solid #3b82f6;
    }
