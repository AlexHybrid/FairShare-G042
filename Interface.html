<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairShare — House Rental & Bill Splitter (Perfect UI)</title>
  <style>

    /* =================================
       GLOBAL VARIABLES & THEME SETTINGS
       ================================= */
        :root {
      --accent: #3b82f6;
      --bg-gradient: linear-gradient(135deg, #000428 0%, #004e92 100%);
      --navbar-bg: rgba(255, 255, 255, 0.95);
      --text-main: #ffffff;
      --text-nav: #333333;
      --max-width-content: 1000px;
    }

    * { 
      box-sizing: border-box; 
      margin: 0; 
      padding: 0; 
    }

    /* =====================
       2. BODY & MAIN LAYOUT
       ===================== */
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    .container {
      max-width: var(--max-width-content);
      margin: 0 auto;
      padding: 0 1rem;
      width: 100%;
    }

    /* ==========================
       3. NAVIGATION BAR (HEADER)
       ========================== */
    header {
      padding: 2rem 0;
      width: 100%;
    }

    .navbar {
      background: var(--navbar-bg);
      width: 90%; 
      max-width: 1400px;
      margin: 0 auto;
      padding: 0.75rem 1rem;
      border-radius: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    .navbar ul {
      display: flex;
      list-style: none;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
    }

     .navbar a {
      text-decoration: none;
      color: var(--text-nav);
      font-weight: 500;
      font-size: 1rem;
      transition: 0.3s;
      padding: 0.25rem 0.5rem;
    }

    .navbar a:hover { 
      color: var(--accent); 
    }

    .navbar a.active {
      color: #3b82f6;
      border-bottom: 2px solid #3b82f6;
    }

    /* ==============================
       4. HERO SECTION (LANDING PAGE)
       ============================== */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-bottom: 3rem;
      position: relative;
      
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
    }

    .hero h1 {
      font-size: 5rem;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.1;
      letter-spacing: -2px;
      margin-bottom: 1.5rem;
      text-shadow: 0 4px 15px rgba(0,0,0,0.4);
    }

    .hero p.slogan {
      font-size: 1.5rem;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.9;
      margin-bottom: 2rem;
    }

    .divider {
      width: 250px;
      height: 4px;
      background: #1e3a8a;
      border-radius: 2px;
    }

    /* ==================================
       5. RESPONSIVE DESIGN (MOBILE VIEW)
       ================================== */
    @media (max-width: 768px) {
      .hero h1 { font-size: 3rem; }
      .navbar ul { gap: 1rem; }
      .navbar a { font-size: 0.85rem; }
    }
  </style>
</head>
<body>

  <header>
    <nav class="navbar">
      <ul>
        <li><a href="#" class="active">Home</a></li>
        <li><a href="#">Login</a></li>
        <li><a href="#">Settings</a></li>
        <li><a href="#">Help</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
        <li><a href="#">FAQ</a></li>
      </ul>
    </nav>
  </header>

  <main class="container hero">
    <h1>House Rental<br>& Bill Splitter</h1>
    <p class="slogan">Cheap. Fast. Easy.</p>
    <div class="divider"></div>
  </main>

</body>
</html>
