<!DOCTYPE html>
<html>
<head>
    <title>Results</title>
</head>
<body>
    <h2>Rent Split Results</h2>
    <ul>
        {% for name, share in zip(names, shares) %}
            <li>{{ name }} pays: RM{{ share }}</li>
        {% endfor %}
    </ul>
    <p>Total Rent: RM{{ total_rent }}</p>
    <p>Utility Bill: RM{{ utility_bill }}</p>
</body>
</html>
