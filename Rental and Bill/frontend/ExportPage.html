<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FairShare - Export Data</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Verdana, sans-serif;
      background-color: #080d20;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .export-card {
      background-color: #111833;
      padding: 3rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .btn {
      display: inline-block;
      padding: 1rem 2rem;
      margin: 1rem;
      font-size: 1.2rem;
      font-weight: bold;
      color: white;
      text-decoration: none;
      border-radius: 10px;
      transition: 0.3s;
      border: none;
      cursor: pointer;
    }
    .btn-excel { background-color: #107c41; }
    .btn-excel:hover { background-color: #0c5e31; }
    
    .btn-pdf { background-color: #b30b00; }
    .btn-pdf:hover { background-color: #8a0900; }
    
    .btn-back { background-color: #3b82f6; }
    .btn-back:hover { background-color: #2563eb; }
    
    .back-container {
      margin-top: 2rem;
      border-top: 1px solid #1e293b;
      padding-top: 1.5rem;
    }
  </style>
</head>
<body>

<div class="export-card">
 <h2>SELECT THE EXPORT FORMAT</h2>
  <p style="color: #94a3b8; margin-bottom: 2rem;">Download your FairShare bills in your preferred format.</p>
    
    <!-- This form calls the Excel export endpoint -->
    <form action="/api/expenses/export/excel" method="GET" style="display: inline;">
      <button type="submit" class="btn btn-excel">📊 Export to Excel</button>
    </form>

    <!-- This form calls the PDF export endpoint -->
    <form action="/api/expenses/export/pdf" method="GET" style="display: inline;">
      <button type="submit" class="btn btn-pdf">📄 Export to PDF</button>
    </form>
    
    <div class="back-container">
      <a href="Dashboard.html" class="btn btn-back">⬅ Back to Dashboard</a>
    </div>
</div>

</body>
</html>
