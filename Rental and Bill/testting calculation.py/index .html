<form method="POST" action="/split">
  <input type="number" name="total_rent" placeholder="Total Rent">
  <input type="number" name="num_people" placeholder="Number of People">
  <input type="text" name="names" placeholder="Person 1 Name">
  <input type="text" name="names" placeholder="Person 2 Name">
  <input type="number" name="utility_bill" placeholder="Utility Bill">

  <select name="method">
    <option value="equal">Equal Split</option>
    <option value="weighted">Weighted Split</option>
    <option value="custom">Custom Split</option>
  </select>

  <button type="submit">Calculate</button>
</form>
