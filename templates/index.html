<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - App</title>
    <!-- Link to our CSS file located in the static folder -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <!-- Main white card with soft shadows -->
        <div class="card">
            
            <!-- Motivational Quote Header -->
            <div class="quote-container">
                <div class="quote-badge">
                    <span class="quote-dot"></span>
                    <span class="quote-text">With thoughtful mindset, create independent life</span>
                </div>

            </div>
            <!-- Display Error/Success Messages sent from Flask -->
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <ul class="flash-messages">
                {% for category, message in messages %}
                  <li class="flash-message {{ category }}">{{ message }}</li>
                {% endfor %}
                </ul>
              {% endif %}
            {% endwith %}

            <!-- ===================== LOGIN FORM ===================== -->
            <!-- We add the 'active' class to this section so it shows up first by default -->
            <div id="login-section" class="form-section active">
                <h2 class="title">Welcome <span class="gradient-text">Back</span></h2>
                
                <!-- The form submits data to the /login route via POST method -->
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label for="login-email">Email Address</label>
                        <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" name="password" placeholder="••••••••" required>
                    </div>
                    
                    <button type="submit" class="btn-primary">Log In</button>
                </form>
                
                <div class="toggle-text">
                    Don't have an account? <a href="#" id="show-signup">Sign up</a>
                </div>
            </div>
